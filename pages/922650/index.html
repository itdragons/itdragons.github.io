Q7cGBo+98WsLkuktFqiZabtXuQTu/Y5ETbR0v7tNSFnvrmu6pjdoan2KjMu8q/Hmj1EfCO2ZGfEIbIXKUlw8qaX9/b2oeSJmFksSeT/Fn0V3nSypChh4Gjh74ybO9aeZ/AN2dwciu2/MhAAAAAElFTkSuQmCC">Git修改分支名<!----></h1>  <div class="theme-vdoing-content content__default"><h2 id="同时修改本地分支名和对应的远程分支名"><a href="#同时修改本地分支名和对应的远程分支名" class="header-anchor">#</a> 同时修改本地分支名和对应的远程分支名</h2> <p>修改前要确保本地分支的代码是最新的，并且修改后不会影响到同事的代码。</p> <ol><li>修改本地分支名</li></ol> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">git</span> branch <span class="token parameter variable">-m</span> oldBranchName newBranchName
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><ol start="2"><li>删除远程分支</li></ol> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">git</span> push origin :oldBranchName
<span class="token comment"># 或者 git push origin --delete oldBranchName</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br></div></div><ol start="3"><li>改名后的本地分支推送到远程</li></ol> <div class="language-sh line-numbers-mode"><pre class="language-sh"><code><span class="token function">git</span> push --set-upstream origin newBranchName
